name: CI/CD Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  releases: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest]
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install openssl@3

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libssl-dev

    - name: Build
      run: |
        make clean
        make

    - name: Archive binaries
      uses: actions/upload-artifact@v4
      with:
        name: encryptoni-binaries-${{ matrix.os }}
        path: |
          encrypt
          decrypt

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare Release Assets
      run: |
        mkdir -p release_assets
        for os in macos-14 ubuntu-latest; do
          cp artifacts/encryptoni-binaries-${os}/encrypt release_assets/encrypt-${os}
          cp artifacts/encryptoni-binaries-${os}/decrypt release_assets/decrypt-${os}
        done

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: release_assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-formula:
    name: Update Homebrew Formula
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Compute sha256 and update formula
      run: |
        VERSION="${GITHUB_REF_NAME}"
        TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${VERSION}.tar.gz"

        # Wait for GitHub to make the tarball available after release creation
        echo "Waiting 30s for tarball to become available..."
        sleep 30

        SHA256=$(curl -sL "${TARBALL_URL}" | shasum -a 256 | awk '{print $1}')

        echo "Tag:     ${VERSION}"
        echo "URL:     ${TARBALL_URL}"
        echo "SHA256:  ${SHA256}"

        # Verify we got a real hash (not a 404 HTML page hash)
        if [ ${#SHA256} -ne 64 ]; then
          echo "ERROR: SHA256 looks wrong (length ${#SHA256}), aborting."
          exit 1
        fi

        # Strip leading 'v' to get plain version number (e.g. v1.0.1 → 1.0.1)
        PLAIN_VERSION="${VERSION#v}"

        # Patch Formula/encryptoni.rb in-place
        sed -i "s|version \".*\"|version \"${PLAIN_VERSION}\"|" Formula/encryptoni.rb
        sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|"         Formula/encryptoni.rb

        echo "--- Updated formula ---"
        cat Formula/encryptoni.rb

    - name: Commit updated formula
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/encryptoni.rb
        git diff --cached --quiet || git commit -m "chore: update formula to ${GITHUB_REF_NAME}"
        git push origin main
